# ─────────────────────────────────────────────────────────────────────────
# Release (Windows) — 자동 빌드/서명/릴리스 워크플로우
# ─────────────────────────────────────────────────────────────────────────
# [왜 이 파일이 있나]
#   개발자가 `git tag v1.1.0 && git push --tags`를 누르면 이 워크플로우가
#   클라우드 Windows 머신에서 자동으로 앱을 빌드·서명하고 GitHub Releases에
#   Draft 형태로 업로드한다. 사람이 빌드 PC를 켤 필요가 없고, 수동 업로드 실수도 없다.
#
# [전체 흐름]
#   1) 태그 v*.*.* 푸시 감지
#   2) Windows runner 깨움 → 소스 checkout
#   3) Node.js / Rust 설치 및 캐시
#   4) npm ci → 프론트 의존성 설치
#   5) prebuild(sync-bundle-resources) → 번들 리소스 자동 스캔
#   6) tauri-action → cargo build + vite build + tauri build + 서명 + Releases 업로드
#   7) latest.json 자동 생성 (Tauri Updater가 참조할 매니페스트)
#   8) Draft 릴리스 생성 → 사람이 GitHub에서 release notes 확인 후 수동 Publish
#
# [안전장치]
#   - 트리거: 태그 푸시만 (브랜치 푸시는 무시 → 실수 배포 방지)
#   - releaseDraft: true → 자동 공개 안 되고 Draft로만 생성
#   - pre-release 태그(v1.0.0-beta 등)는 prerelease 플래그 자동 true
#
# [필요한 Secrets (사용자가 GitHub 저장소에 등록)]
#   - TAURI_SIGNING_PRIVATE_KEY          : Tauri 서명용 private 키 (G드라이브 grader.key 내용)
#   - TAURI_SIGNING_PRIVATE_KEY_PASSWORD : 위 키의 패스워드
#   (GITHUB_TOKEN은 GitHub Actions가 자동 주입하므로 등록 불필요)
# ─────────────────────────────────────────────────────────────────────────

name: Release (Windows)

# 태그 푸시 시에만 실행
# - v1.0.0, v1.2.3 등 정식 버전
# - v1.0.0-beta, v1.0.0-rc.1 등 pre-release도 포함 (-글자 이후 와일드카드)
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

# 워크플로우가 Releases를 생성·수정하려면 contents 쓰기 권한 필요
permissions:
  contents: write

jobs:
  release:
    # Windows 전용 빌드 — macOS/Linux는 현재 범위 외
    runs-on: windows-latest

    # [2026-04-30, v1.0.5] actions/checkout@v4 → @v5, actions/setup-node@v4 → @v5 업그레이드.
    #   v5 액션은 자체적으로 Node 24 런타임을 사용하므로 v1.0.4 의
    #   `FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true` 옵트인 환경변수가 더 이상 필요 없어 제거함.
    #   2026-06-02 Node 24 강제 전환 / 2026-09-16 Node 20 제거 일정에 v5 정식 적용으로 대응.

    steps:
      # 1) 소스 받아오기
      - name: Checkout repository
        uses: actions/checkout@v5

      # 2) Node.js 20 설치 + npm 캐시 (setup-node@v5 자체는 Node 24 로 동작, node-version 은 빌드용 Node)
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      # 3) Rust stable 설치 (tauri-action이 cargo를 호출하므로 필수)
      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      # 4) Rust 컴파일 캐시 — 빌드 시간 대폭 단축 (2회차 이후)
      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # 5) 프론트 의존성 설치 (package-lock.json 기반 결정적 설치)
      - name: Install npm dependencies
        run: npm ci

      # 6) 번들 리소스 동기화 (python-engine/*.py, illustrator-scripts/*.jsx 자동 스캔)
      #    - Phase A-5에서 만든 스크립트
      #    - tauri build가 호출하는 npm run build → prebuild hook이 자동 실행하지만,
      #      명시적으로 여기서도 한 번 실행하여 CI 로그에서 쉽게 확인 가능하도록 함
      - name: Sync bundle resources
        run: npm run sync:resources

      # 6.5) 진단용 — Secret 길이 확인 (값 자체는 노출 X)
      # TAURI_SIGNING_PRIVATE_KEY 기대 길이: 348 (정확히)
      # TAURI_SIGNING_PRIVATE_KEY_PASSWORD 기대 길이: 9 (stiz3000!)
      # 다른 값이 나오면 Secret 등록 시 공백/줄바꿈 혼입 또는 오타
      - name: Debug Secret lengths
        shell: bash
        run: |
          echo "PRIVATE_KEY length: ${#TAURI_SIGNING_PRIVATE_KEY}"
          echo "PASSWORD length: ${#TAURI_SIGNING_PRIVATE_KEY_PASSWORD}"
          echo "(기대값: PRIVATE_KEY=348, PASSWORD=9)"
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      # 6.7) CHANGELOG.md 에서 현재 버전 섹션을 추출하여 릴리스 본문으로 사용
      #      [왜 이게 필요한가]
      #        v1.0.0 배포 시 latest.json의 notes 필드가 placeholder 그대로 들어갔다.
      #        그래서 자동 업데이트 모달에 "자동 생성된 릴리스입니다. 아래 체크 후..." 가
      #        직원 PC로 그대로 노출되는 결함 발생.
      #      [어떻게 추출하나]
      #        1) github.ref_name(v1.0.1)에서 'v' 제거 → 버전(1.0.1)
      #        2) awk로 CHANGELOG.md 에서 "## [1.0.1]" 라인부터 다음 "## [" 직전까지 본문 추출
      #        3) GITHUB_OUTPUT 으로 다음 step에 전달
      #        4) 추출 실패(섹션 누락 등) 시 fallback 본문 사용 — 빌드를 막진 않음
      - name: Extract CHANGELOG section
        id: changelog
        shell: bash
        run: |
          # 태그(v1.0.1) → 버전(1.0.1)
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Extracting CHANGELOG for version: $VERSION"

          # awk로 "## [버전]" 라인 다음부터 다음 "## " 헤더 직전까지 추출
          # 왜 [[]/[]] 문자 클래스: gawk가 \[ 를 "plain ["로 취급해 경고+매칭 실패하므로
          # 문자 클래스 [[] / []] 로 [ 와 ] 를 표현. POSIX 호환되고 경고도 안 남.
          # 왜 종료 조건을 `^## ` (대괄호 무관)로 확장했는가:
          #   v1.0.3까지의 awk 는 종료 조건이 `^## [[]` 였다. 이 경우 마지막 정식 버전
          #   추출 시 다음 `## [버전]` 헤더가 없어 EOF 까지 본문이 부풀어 버린다 (errors.md
          #   2026-04-29 v1.0.4 항목 참조). CHANGELOG.md 의 마지막 섹션 `## 이 전 버전들`
          #   같은 일반 ## 헤더에서 깔끔히 끊기도록 패턴을 넓혔다. 본문 안에 `## `(스페이스 있는
          #   2-단계 헤더)을 쓰지 않는 keepachangelog 컨벤션 준수가 전제. 본문 안의 `### `
          #   (3-단계)는 영향 없음.
          BODY=$(awk -v ver="$VERSION" '
            $0 ~ "^## [[]" ver "[]]" { found = 1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md)

          # 추출 결과가 비어있으면 fallback 메시지로 대체
          # 왜 어휘를 "⚠️ 누락"으로 강하게: v1.0.0 결함이 placeholder 어휘("자동 생성된 릴리스입니다…")로
          # 무심코 publish되어 발생했음. 같은 패턴이 다시 나오지 않도록 한눈에 결함임을 인지 가능한
          # 표현으로 통일. ::error:: 로 GitHub Actions UI 빨간 배지 띄움 (빌드는 안 막음 — releaseDraft
          # 안전망에 의존).
          if [ -z "$(echo "$BODY" | tr -d '[:space:]')" ]; then
            echo "::error::CHANGELOG.md 에 [$VERSION] 섹션이 없습니다. Publish 전에 반드시 본문을 교체하세요."
            BODY=$(printf '## ⚠️ Grader v%s — CHANGELOG.md 누락 (수정 필요)\n\n**경고**: 자동 본문 추출에 실패했습니다. `CHANGELOG.md` 에 `[%s]` 섹션이 없어 이 fallback 텍스트가 사용되었습니다.\n\n**즉시 조치**:\n1. `CHANGELOG.md` 에 `## [%s] — YYYY-MM-DD` 섹션 추가 후 변경사항 작성\n2. 본 GitHub Release 페이지에서 본문 직접 교체 (Edit → 붙여넣기)\n3. 또는 태그 삭제 후 재푸시로 워크플로우 재실행\n\n> 이 메시지를 그대로 Publish 하면 자동 업데이트 모달에 그대로 노출됩니다.\n' "$VERSION" "$VERSION" "$VERSION")
          fi

          # GITHUB_OUTPUT 에 멀티라인 출력으로 저장 (heredoc 패턴)
          # EOF 구분자를 매번 랜덤화하면 안전하지만 여기선 RELEASE_BODY_EOF 고정으로 충분
          {
            echo "body<<RELEASE_BODY_EOF"
            echo "$BODY"
            echo "RELEASE_BODY_EOF"
          } >> "$GITHUB_OUTPUT"

          # CI 로그에 미리보기 (디버깅 용)
          echo "--- Release body preview (first 20 lines) ---"
          echo "$BODY" | head -n 20
          echo "----------------------------------------------"

      # 7) Tauri 빌드 + 서명 + GitHub Release 업로드 (한 번에)
      #    tauri-apps/tauri-action@v0 — Tauri 팀 공식 액션 (Tauri 2.x 호환)
      #    자동 수행:
      #      - npm run build → vite 프론트 번들
      #      - cargo build → Rust 바이너리
      #      - tauri build → MSI + NSIS 설치 파일 생성
      #      - createUpdaterArtifacts: true 설정에 따라 .msi.zip / .nsis.zip + .sig 생성
      #      - includeUpdaterJson: true → latest.json 매니페스트 생성
      #      - 모든 산출물을 GitHub Release에 업로드
      - name: Build, sign and publish Release (Draft)
        uses: tauri-apps/tauri-action@v0
        env:
          # GitHub API 호출용 (자동 제공, 별도 등록 불필요)
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 서명 키 쌍 (사용자가 Settings → Secrets에 등록)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # 릴리스 태그명 = 트리거된 태그 그대로 (예: v1.1.0)
          tagName: ${{ github.ref_name }}
          # __VERSION__ 은 tauri.conf.json의 version으로 자동 치환됨
          releaseName: 'Grader v__VERSION__'
          # 왜 steps.changelog.outputs.body: 위의 "Extract CHANGELOG section" step에서
          # CHANGELOG.md 의 해당 버전 섹션을 추출해 둔 결과를 그대로 본문으로 사용.
          # 이 본문이 latest.json 의 notes 필드에도 들어가서, 자동 업데이트 모달에
          # 실제 변경사항이 노출됨 (placeholder 노출 결함 방지).
          releaseBody: ${{ steps.changelog.outputs.body }}
          # Draft로 생성 → 사람이 GitHub 페이지에서 확인 후 수동 Publish
          # 실수로 태그 푸시해도 직원 PC로 자동 전파되지 않는 안전장치
          releaseDraft: true
          # 태그에 '-'가 포함되면(예: v1.0.0-beta) pre-release로 표시
          # GitHub Releases에서 "Pre-release" 뱃지가 붙고, latest.json 대상에서 제외됨
          prerelease: ${{ contains(github.ref_name, '-') }}
          # latest.json 매니페스트 자동 생성·업로드 (Tauri Updater 핵심)
          includeUpdaterJson: true
          # Windows 타겟 명시 (혹시 runner가 다른 타겟을 시도하지 않도록)
          args: --target x86_64-pc-windows-msvc
